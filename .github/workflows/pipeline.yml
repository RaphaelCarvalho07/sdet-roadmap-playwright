name: 🔄 SDET CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write # Required for peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  lint:
    name: 🔍 Run Linter Check
    runs-on: ubuntu-latest
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Run Lint
        run: npm run lint

  api-tests:
    name: ⚡ Run Playwright API Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      # Optimized: No browser installation step for API tests!

      - name: 🚀 Execute API Tests
        env:
          API_URL: http://localhost:3000
          UI_URL: http://localhost:3000
        run: npx playwright test --project=api-tests --reporter=blob

      - name: 📤 Upload API Blobs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-api
          path: blob-report/
          retention-days: 1

  ui-tests:
    name: 🌐 Run Playwright UI Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🚀 Execute UI Tests
        env:
          API_URL: ${{ secrets.API_URL || 'http://localhost:3000' }}
          UI_URL: ${{ secrets.UI_URL || 'http://localhost:3000' }}
        run: npx playwright test --project=ui-tests-chrome --project=ui-tests-firefox --project=ui-tests-webkit --reporter=blob

      - name: 📤 Upload UI Blobs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-ui
          path: blob-report/
          retention-days: 1

  publish-report:
    name: 📊 Consolidate & Publish Reports
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    steps:
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📥 Download API blob report
        uses: actions/download-artifact@v4
        with:
          name: blob-report-api
          path: all-blobs

      - name: 📥 Download UI blob report
        uses: actions/download-artifact@v4
        with:
          name: blob-report-ui
          path: all-blobs

      - name: 🔀 Merge Reports
        run: npx playwright merge-reports --reporter html ./all-blobs

      - name: 📊 Upload Consolidated HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: 🚀 Deploy to GitHub Pages
        if: success() || failure() # Deploy report even if some tests fail, allowing visual debugging of the failures
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: 📝 Output Pages URL to Job Summary
        if: success() || failure() # Mostra o link mesmo se os testes falharem
        run: |
          echo "### 📊 Playwright Consolidated Report is live!" >> $GITHUB_STEP_SUMMARY
          echo "👉 [Click here to view the HTML Report](https://raphaelcarvalho07.github.io/sdet-roadmap-playwright/)" >> $GITHUB_STEP_SUMMARY
