name: 🔄 SDET CI Pipeline

# Controls when the workflow will run
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# A workflow run is made up of one or more jobs
jobs:
  test-execution:
    name: 🧪 Run Playwright API Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code onto the GitHub runner machine
      - name: 📁 Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment with version 20
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install development dependencies cleanly
      - name: 📦 Install Dependencies
        run: npm ci

      # Step 4: Code Quality and Linting Check (Fail-Fast Strategy)
      - name: 🔍 Run Linter Check
        run: npm run lint

      # Step 5: Run Playwright tests with environment variables injected securely from GitHub Secrets Vault
      - name: 🚀 Execute Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: npm test
      
      # Step 6: Upload Playwright HTML Report as a build artifact (Runs even if previous steps fail)
      - name: 📊 Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7